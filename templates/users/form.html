{% extends "base.html" %}
{% block title %}{{ action }} - PTIT{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('users_list') }}">Users</a></li>
        <li class="breadcrumb-item active">{{ action }}</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">
                    <i class="fas fa-user me-2"></i>{{ action }}
                </h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="username" name="username"
                               value="{{ user.username if user else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">
                            Mật khẩu {% if not user %}<span class="text-danger">*</span>{% else %}(để trống nếu không đổi){% endif %}
                        </label>
                        <input type="password" class="form-control" id="password" name="password" {{ 'required' if not user else '' }}>
                    </div>

                    <div class="mb-3">
                        <label for="role" class="form-label">Vai trò <span class="text-danger">*</span></label>
                        <select class="form-select" id="role" name="role" required>
                            <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>Admin</option>
                            <option value="lab" {% if user and user.role == 'lab' %}selected{% endif %}>Lab</option>
                        </select>
                    </div>

                    <div class="mb-3" id="labSelect">
                        <label for="lab_id" class="form-label">Lab</label>
                        <select class="form-select" id="lab_id" name="lab_id">
                            <option value="">-- Chọn Lab --</option>
                            {% for lab in labs %}
                            <option value="{{ lab.id }}" {% if user and user.lab_id == lab.id %}selected{% endif %}>
                                {{ lab.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('users_list') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Quay lại
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Lưu
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const roleSelect = document.getElementById('role');
    const labSelect = document.getElementById('labSelect');

    function toggleLabSelect() {
        labSelect.style.display = roleSelect.value === 'lab' ? 'block' : 'none';
    }

    roleSelect.addEventListener('change', toggleLabSelect);
    toggleLabSelect();
});
</script>
{% endblock %}
